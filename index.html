<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrowFood — Аналитика</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e5e5e5; min-height: 100vh; }
    
    .header { background: #1a1d27; border-bottom: 1px solid #2a2d3a; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .header h1 { font-size: 18px; font-weight: 600; color: #fff; }
    .header .updated-time { font-size: 12px; color: #666; }
    
    .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
    
    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: #1a1d27; border-radius: 12px; padding: 6px; }
    .tab { padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; color: #888; cursor: pointer; transition: all 0.2s; border: none; background: transparent; }
    .tab:hover { color: #ccc; }
    .tab.active { background: #6366f1; color: #fff; }
    
    /* Period badge */
    .period-info { font-size: 12px; color: #666; margin-bottom: 16px; padding: 8px 16px; background: #1a1d27; border-radius: 8px; display: inline-block; }
    
    /* Cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 10px; padding: 14px; }
    .card .label { font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .card .value { font-size: 20px; font-weight: 700; color: #fff; }
    .card .delta { font-size: 11px; margin-top: 4px; }
    .card .delta.up { color: #4ade80; }
    .card .delta.down { color: #f87171; }
    .card.highlight { border-color: #6366f1; }
    .card.highlight .value { color: #818cf8; }
    
    /* Charts */
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .chart-box { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; padding: 16px; }
    .chart-box h3 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: #ccc; }
    .chart-box canvas { max-height: 240px; }
    
    /* Growth section */
    .growth-section { margin-top: 24px; }
    .growth-section h2 { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #2a2d3a; display: flex; align-items: center; gap: 8px; }
    .growth-section h2 span { font-size: 16px; }
    .growth-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 20px; }
    
    /* Loading / Error */
    .loading { text-align: center; padding: 60px; color: #666; font-size: 14px; }
    .error { background: #2a1a1a; border: 1px solid #f87171; border-radius: 8px; padding: 16px; color: #f87171; margin-bottom: 20px; display: none; }
    
    /* Section title */
    .section-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #2a2d3a; display: flex; align-items: center; gap: 8px; }
    
    @media (max-width: 768px) {
      .tabs { flex-wrap: wrap; }
      .tab { flex: 1; min-width: 80px; text-align: center; padding: 8px 12px; font-size: 13px; }
      .charts-grid, .growth-grid { grid-template-columns: 1fr; }
      .cards { grid-template-columns: repeat(2, 1fr); }
      .header { padding: 12px 16px; }
      .container { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌱 GrowFood Analytics</h1>
    <span class="updated-time" id="updated"></span>
  </div>
  
  <div class="container">
    <div id="error-box" class="error"></div>
    <div id="loading" class="loading">Загрузка данных...</div>
    
    <div id="content" style="display:none">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="day">📅 День</button>
        <button class="tab" data-tab="week">📊 Неделя</button>
        <button class="tab" data-tab="month">📆 Месяц</button>
      </div>
      
      <div class="period-info" id="period-info"></div>
      
      <!-- Summary Cards -->
      <div class="cards" id="cards"></div>
      
      <!-- Main Charts -->
      <div class="section-title">📈 Динамика</div>
      <div class="charts-grid" id="main-charts"></div>
      
      <!-- Growth Charts -->
      <div class="growth-section">
        <h2>📐 Прирост / Снижение</h2>
        <div class="growth-grid" id="growth-charts"></div>
      </div>
    </div>
  </div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzPr2F50egG1jeynWjNsFPIl_8H7Fdtle1o7qIJMYv0mmaMmwvJAhDaBYSvH_nN7WvN/exec';

const MONTH_NAMES = {
  '❄️ январь 2026': 'Январь', '❄️ февраль 2026': 'Февраль', '🌿 март 2026': 'Март',
  '🌱 Текущий месяц': 'Апрель', '🌿 май 2026': 'Май', '☀️ июнь 2026': 'Июнь',
  '☀️ июль 2026': 'Июль', '☀️ август 2026': 'Август', '🍂 сентябрь 2026': 'Сентябрь',
  '🍂 октябрь 2026': 'Октябрь', '🍂 ноябрь 2026': 'Ноябрь', '❄️ декабрь 2026': 'Декабрь'
};

// Metrics that are already percentages (0.73 = 73%)
const PERCENTAGE_METRICS = ['доля кастома', 'Доля Ритейла из производительности'];

let rawData = [];
let currentTab = 'day';
let charts = [];

// Month mapping to ensure correct order
const MONTH_ORDER = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

async function load() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    rawData = json.data || [];
    document.getElementById('updated').textContent = 'Обновлено: ' + new Date(json.updated).toLocaleString('ru-RU');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    initTabs();
    renderAll();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    const err = document.getElementById('error-box');
    err.style.display = 'block';
    err.textContent = 'Ошибка загрузки: ' + e.message;
  }
}

function initTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      destroyCharts();
      renderAll();
    });
  });
}

function destroyCharts() {
  charts.forEach(c => c.destroy());
  charts = [];
}

function getEntries(metric) {
  return rawData.filter(r => r.metric === metric);
}

function getMonthKey(rawMonth) {
  return MONTH_NAMES[rawMonth] || rawMonth;
}

// Get all months in calendar order (Jan→Dec)
function getAllMonths() {
  const monthSet = [];
  rawData.forEach(r => {
    const m = getMonthKey(r.month);
    if (m && !monthSet.includes(m)) monthSet.push(m);
  });
  // Sort by calendar order using MONTH_ORDER index
  monthSet.sort((a, b) => {
    const idxA = MONTH_ORDER.indexOf(a);
    const idxB = MONTH_ORDER.indexOf(b);
    return idxA - idxB;
  });
  return monthSet;
}

// Get current month - explicitly find "🌱 Текущий месяц" (April) which has real data
function getCurrentMonth() {
  // First try to find the special "Текущий месяц" entry
  const currentEntry = rawData.find(r => r.month === '🌱 Текущий месяц');
  if (currentEntry) {
    return getMonthKey(currentEntry.month);
  }
  // Fallback to last month in calendar order
  const months = getAllMonths();
  return months[months.length - 1] || 'Апрель';
}

// Sum array
function sum(arr) { return arr.reduce((a,b) => a + b, 0); }

// Format number
function fmt(v) {
  if (v === null || v === undefined) return '—';
  return Number(v).toLocaleString('ru-RU', { maximumFractionDigits: 0 });
}

// Format percentage
function fmtPct(v) {
  if (v === null || v === undefined) return '—';
  const capped = Math.min(100, Math.max(0, v));
  return capped.toFixed(1) + '%';
}

// Calculate % change
function pctChange(current, previous) {
  if (!previous || previous === 0) return null;
  return ((current - previous) / previous * 100);
}

// Check if metric is a percentage type
function isPercentageMetric(metric) {
  return PERCENTAGE_METRICS.includes(metric);
}

// Get last 7 days values from current month (April/"Текущий месяц")
function getLast7Days() {
  const monthKey = '🌱 Текущий месяц';
  const entries = getEntries('ГФ/Приём').filter(e => e.month === monthKey);
  if (!entries.length) return [];
  const vals = entries[0].values;
  // Take last 7 days (or all if less than 7)
  return vals.slice(-7).filter(v => typeof v === 'number' && v > 0);
}

// Get last non-zero value across ALL entries and ALL months for a metric
function getLastDayValue(metric) {
  const allEntries = getEntries(metric);
  if (!allEntries.length) return 0;
  
  // Collect ALL values arrays from ALL entries for this metric
  let allValues = [];
  allEntries.forEach(e => {
    if (Array.isArray(e.values)) {
      allValues = allValues.concat(e.values);
    }
  });
  
  // Find last non-zero value
  for (let i = allValues.length - 1; i >= 0; i--) {
    if (typeof allValues[i] === 'number' && allValues[i] > 0) return allValues[i];
  }
  return 0;
}

// Get sum of last 7 non-zero values across ALL months for a metric
function getLast7DaysSum(metric) {
  const allEntries = getEntries(metric);
  if (!allEntries.length) return 0;
  
  // Collect ALL values arrays from ALL entries for this metric
  let allValues = [];
  allEntries.forEach(e => {
    if (Array.isArray(e.values)) {
      allValues = allValues.concat(e.values);
    }
  });
  
  // Get all non-zero values in order
  const nonZeroValues = allValues.filter(v => typeof v === 'number' && v > 0);
  
  // Take last 7 non-zero values
  const last7 = nonZeroValues.slice(-7);
  return sum(last7);
}

// Get sum of current month for a metric (April/"Текущий месяц")
function getCurrentMonthSum(metric) {
  const monthKey = '🌱 Текущий месяц';
  const entries = getEntries(metric).filter(e => e.month === monthKey);
  if (!entries.length) return 0;
  return sum(entries[0].values.filter(v => typeof v === 'number' && v > 0));
}

// Aggregate all daily values into 12 weeks (week 1 = days 1-7, week 2 = days 8-14, etc.)
function aggregateAllDaysToWeeks() {
  const weeks = [];
  const weekData = { 'ГФ/Приём': [], 'Ритейл': [], 'LAAS': [], 'Приведённая производительность': [] };
  const metrics = ['ГФ/Приём', 'Ритейл', 'LAAS', 'Приведённая производительность'];
  
  // Collect ALL non-zero values in chronological order across all months
  // This avoids the month-length mixing problem
  const allOrderedValues = { 'ГФ/Приём': [], 'Ритейл': [], 'LAAS': [], 'Приведённая производительность': [] };
  
  // Iterate through months in calendar order, collecting all non-zero values
  getAllMonths().forEach(month => {
    metrics.forEach(metric => {
      const entries = getEntries(metric).filter(e => getMonthKey(e.month) === month);
      entries.forEach(e => {
        if (Array.isArray(e.values)) {
          e.values.forEach(v => {
            if (typeof v === 'number' && v > 0) {
              allOrderedValues[metric].push(v);
            }
          });
        }
      });
    });
  });
  
  // Group into weeks: week 1 = positions 0-6, week 2 = positions 7-13, etc.
  const totalDays = allOrderedValues['ГФ/Приём'].length;
  for (let i = 0; i < totalDays; i += 7) {
    const weekIdx = Math.floor(i / 7);
    metrics.forEach(metric => {
      const weekSlice = allOrderedValues[metric].slice(i, i + 7);
      const weekSum = sum(weekSlice.filter(v => typeof v === 'number' && v > 0));
      if (!weekData[metric][weekIdx]) weekData[metric][weekIdx] = 0;
      weekData[metric][weekIdx] += weekSum;
    });
  }
  
  // Generate labels for all weeks
  const totalWeeks = weekData['ГФ/Приём'].length;
  for (let i = Math.max(0, totalWeeks - 12); i < totalWeeks; i++) {
    weeks.push('Нед. ' + (i + 1));
  }
  
  // Slice to last 12 weeks
  Object.keys(weekData).forEach(k => {
    weekData[k] = weekData[k].slice(-12);
  });
  
  return { labels: weeks, data: weekData };
}

// ============ RENDER ============

function renderAll() {
  renderPeriodInfo();
  renderCards();
  renderMainCharts();
  renderGrowthCharts();
}

function renderPeriodInfo() {
  const months = getAllMonths();
  let text = '';
  if (currentTab === 'day') {
    text = `📅 День: ${getCurrentMonth()} 2026 — последний день`;
  } else if (currentTab === 'week') {
    text = `📊 Неделя: Последние 12 недель — недельная агрегация`;
  } else {
    text = `📆 Месяц: ${getCurrentMonth()} 2026 — полный месяц`;
  }
  document.getElementById('period-info').textContent = text;
}

function renderCards() {
  const container = document.getElementById('cards');
  const currentMonth = getCurrentMonth();
  
  // Calculate values based on tab
  let gfPriom, retail, laas, share, shareRetail;
  
  if (currentTab === 'day') {
    // Last single day's value
    gfPriom = getLastDayValue('ГФ/Приём');
    retail = getLastDayValue('Ритейл');
    laas = getLastDayValue('LAAS');
    share = getLastDayValue('доля кастома');
    shareRetail = getLastDayValue('Доля Ритейла из производительности');
  } else if (currentTab === 'week') {
    // Sum of last 7 days
    gfPriom = getLast7DaysSum('ГФ/Приём');
    retail = getLast7DaysSum('Ритейл');
    laas = getLast7DaysSum('LAAS');
    share = getLastDayValue('доля кастома'); // percentage - use last value
    shareRetail = getLastDayValue('Доля Ритейла из производительности');
  } else {
    // Sum of entire current month
    gfPriom = getCurrentMonthSum('ГФ/Приём');
    retail = getCurrentMonthSum('Ритейл');
    laas = getCurrentMonthSum('LAAS');
    share = getLastDayValue('доля кастома'); // percentage - use last value
    shareRetail = getLastDayValue('Доля Ритейла из производительности');
  }
  
  // Format percentage values (multiply by 100, cap at 100%)
  const sharePct = share > 0 ? Math.min(100, share * 100) : 0;
  const shareRetailPct = shareRetail > 0 ? Math.min(100, shareRetail * 100) : 0;
  
  const cards = [
    { label: 'ГФ/Приём', value: fmt(gfPriom) },
    { label: 'Ритейл', value: fmt(retail) },
    { label: 'LAAS', value: fmt(laas) },
    { label: 'Доля кастома', value: fmtPct(sharePct), highlight: true },
    { label: 'Доля Ритейла', value: fmtPct(shareRetailPct), highlight: true }
  ];
  
  container.innerHTML = cards.map(c => {
    const hl = c.highlight ? ' highlight' : '';
    return `<div class="card${hl}"><div class="label">${c.label}</div><div class="value">${c.value}</div></div>`;
  }).join('');
}

// ============ MAIN CHARTS ============

function renderMainCharts() {
  const container = document.getElementById('main-charts');
  container.innerHTML = '';
  
  const chartConfigs = getChartConfig();
  
  chartConfigs.forEach((cfg, idx) => {
    const box = document.createElement('div');
    box.className = 'chart-box';
    box.innerHTML = `<h3>${cfg.title}</h3><canvas id="main-chart-${idx}"></canvas>`;
    container.appendChild(box);
    
    const ctx = document.getElementById('main-chart-' + idx).getContext('2d');
    const chart = new Chart(ctx, {
      type: cfg.type,
      data: { labels: cfg.labels, datasets: cfg.datasets },
      options: getChartOptions(cfg.type)
    });
    charts.push(chart);
  });
}

function getChartConfig() {
  if (currentTab === 'day') {
    return getDayChartConfig(getCurrentMonth());
  } else if (currentTab === 'week') {
    return getWeekChartConfig();
  } else {
    return getMonthChartConfig(getAllMonths());
  }
}

function getDayChartConfig(currentMonth) {
  const monthKey = Object.entries(MONTH_NAMES).find(([k, v]) => v === currentMonth)?.[0] || '🌱 Текущий месяц';
  const entries = getEntries('ГФ/Приём').filter(e => e.month === monthKey || getMonthKey(e.month) === currentMonth);
  
  let days = [];
  if (entries.length) {
    days = entries[0].values.map((_, i) => i + 1);
  }
  
  return [
    {
      title: `ГФ/Приём — ${currentMonth}`,
      type: 'bar',
      labels: days.map(d => d),
      datasets: [
        {
          label: 'ГФ/Приём',
          data: entries.length ? entries[0].values.map(v => typeof v === 'number' && v > 0 ? v : 0) : [],
          backgroundColor: '#6366f1'
        }
      ]
    }
  ];
}

function getWeekChartConfig() {
  const { labels, data } = aggregateAllDaysToWeeks();
  
  return [
    {
      title: 'ГФ/Приём по неделям (последние 12 недель)',
      type: 'bar',
      labels: labels,
      datasets: [{
        label: 'ГФ/Приём',
        data: data['ГФ/Приём'],
        backgroundColor: '#6366f1'
      }]
    },
    {
      title: 'Ритейл по неделям',
      type: 'bar',
      labels: labels,
      datasets: [{
        label: 'Ритейл',
        data: data['Ритейл'],
        backgroundColor: '#22d3ee'
      }]
    },
    {
      title: 'LAAS по неделям',
      type: 'bar',
      labels: labels,
      datasets: [{
        label: 'LAAS',
        data: data['LAAS'],
        backgroundColor: '#f59e0b'
      }]
    },
    {
      title: 'Производительность (линия)',
      type: 'line',
      labels: labels,
      datasets: [{
        label: 'Прив. производительность',
        data: data['Приведённая производительность'].map(v => Math.round(v / 40)),
        borderColor: '#4ade80',
        backgroundColor: '#4ade8033',
        fill: true,
        tension: 0.3
      }]
    }
  ];
}

function getMonthChartConfig(months) {
  return [
    {
      title: 'ГФ/Приём vs План (месяцы)',
      type: 'bar',
      labels: months,
      datasets: [
        { label: 'ГФ/Приём', data: months.map(m => calcMonthTotal('ГФ/Приём', m)), backgroundColor: '#6366f1' },
        { label: 'План', data: months.map(m => calcMonthTotal('План - ГФ/Приём', m)), backgroundColor: '#3a3d5a' }
      ]
    },
    {
      title: 'Ритейл vs План (месяцы)',
      type: 'bar',
      labels: months,
      datasets: [
        { label: 'Ритейл', data: months.map(m => calcMonthTotal('Ритейл', m)), backgroundColor: '#22d3ee' },
        { label: 'План', data: months.map(m => calcMonthTotal('План - Ритейл', m)), backgroundColor: '#3a3d5a' }
      ]
    },
    {
      title: 'LAAS vs План (месяцы)',
      type: 'bar',
      labels: months,
      datasets: [
        { label: 'LAAS', data: months.map(m => calcMonthTotal('LAAS', m)), backgroundColor: '#f59e0b' },
        { label: 'План', data: months.map(m => calcMonthTotal('План - LAAS', m)), backgroundColor: '#3a3d5a' }
      ]
    },
    {
      title: 'Приведённая производительность (тренд)',
      type: 'line',
      labels: months,
      datasets: [{
        label: 'Прив. производительность',
        data: months.map(m => calcMonthTotal('Приведённая производительность', m)),
        borderColor: '#4ade80',
        backgroundColor: '#4ade8033',
        fill: true,
        tension: 0.3
      }]
    }
  ];
}

function calcMonthTotal(metric, monthName) {
  let total = 0;
  getEntries(metric).forEach(entry => {
    if (getMonthKey(entry.month) === monthName) {
      total += sum(entry.values.filter(v => typeof v === 'number' && v > 0));
    }
  });
  return total;
}

function getChartOptions(type) {
  const base = {
    responsive: true,
    plugins: {
      legend: { labels: { color: '#888', font: { size: 11 } } },
      tooltip: {
        callbacks: {
          label: ctx => ctx.dataset.label + ': ' + (typeof ctx.raw === 'number' ? ctx.raw.toLocaleString('ru-RU', { maximumFractionDigits: 0 }) : ctx.raw)
        }
      }
    },
    scales: {
      x: { ticks: { color: '#666', font: { size: 10 } }, grid: { color: '#1e2030' } },
      y: { ticks: { color: '#666', font: { size: 10 } }, grid: { color: '#1e2030' } }
    }
  };
  return base;
}

// ============ GROWTH CHARTS ============

function renderGrowthCharts() {
  const container = document.getElementById('growth-charts');
  container.innerHTML = '';
  
  const months = getAllMonths();
  
  // Calculate month-over-month change
  const momData = calcMoMChange(months);
  
  // Create growth chart configs
  const configs = [
    {
      title: '📊 Месяц к месяцу (% изменения)',
      labels: momData.labels,
      datasets: [{
        label: 'ГФ/Приём %',
        data: momData.gfPriom,
        borderColor: '#6366f1',
        backgroundColor: '#6366f133',
        fill: true,
        tension: 0.3
      }, {
        label: 'Ритейл %',
        data: momData.retail,
        borderColor: '#22d3ee',
        backgroundColor: '#22d3ee33',
        fill: true,
        tension: 0.3
      }]
    }
  ];
  
  configs.forEach((cfg, idx) => {
    const box = document.createElement('div');
    box.className = 'chart-box';
    box.innerHTML = `<h3>${cfg.title}</h3><canvas id="growth-chart-${idx}"></canvas>`;
    container.appendChild(box);
    
    const ctx = document.getElementById('growth-chart-' + idx).getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: { labels: cfg.labels, datasets: cfg.datasets },
      options: {
        ...getChartOptions('line'),
        plugins: {
          ...getChartOptions('line').plugins,
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.dataset.label}: ${ctx.raw !== null ? ctx.raw.toFixed(1) + '%' : '—'}`
            }
          }
        }
      },
      scales: {
        ...getChartOptions('line').scales,
        y: {
          ...getChartOptions('line').scales.y,
          ticks: {
            ...getChartOptions('line').scales.y.ticks,
            callback: v => v + '%'
          }
        }
      }
    });
    charts.push(chart);
  });
}

function calcMoMChange(months) {
  const labels = [];
  const gfValues = [];
  const retailValues = [];
  
  for (let i = 1; i < months.length; i++) {
    const curr = months[i];
    const prev = months[i - 1];
    
    labels.push(curr);
    
    const currGf = calcMonthTotal('ГФ/Приём', curr);
    const prevGf = calcMonthTotal('ГФ/Приём', prev);
    gfValues.push(pctChange(currGf, prevGf));
    
    const currRetail = calcMonthTotal('Ритейл', curr);
    const prevRetail = calcMonthTotal('Ритейл', prev);
    retailValues.push(pctChange(currRetail, prevRetail));
  }
  
  return { labels, gfPriom: gfValues, retail: retailValues };
}

load();
