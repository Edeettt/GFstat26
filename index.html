<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrowFood — Аналитика</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e5e5e5; min-height: 100vh; }
    
    .header { background: #1a1d27; border-bottom: 1px solid #2a2d3a; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .header h1 { font-size: 18px; font-weight: 600; color: #fff; }
    .header .updated-time { font-size: 12px; color: #666; }
    
    .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
    
    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: #1a1d27; border-radius: 12px; padding: 6px; }
    .tab { padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; color: #888; cursor: pointer; transition: all 0.2s; border: none; background: transparent; }
    .tab:hover { color: #ccc; }
    .tab.active { background: #6366f1; color: #fff; }
    
    /* Period badge */
    .period-info { font-size: 12px; color: #666; margin-bottom: 16px; padding: 8px 16px; background: #1a1d27; border-radius: 8px; display: inline-block; }
    
    /* Cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 10px; padding: 14px; }
    .card .label { font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .card .value { font-size: 20px; font-weight: 700; color: #fff; }
    .card .delta { font-size: 11px; margin-top: 4px; }
    .card .delta.up { color: #4ade80; }
    .card .delta.down { color: #f87171; }
    .card.highlight { border-color: #6366f1; }
    .card.highlight .value { color: #818cf8; }
    
    /* Charts */
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .chart-box { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; padding: 16px; }
    .chart-box h3 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: #ccc; }
    .chart-box canvas { max-height: 240px; }
    
    /* Growth section */
    .growth-section { margin-top: 24px; }
    .growth-section h2 { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #2a2d3a; display: flex; align-items: center; gap: 8px; }
    .growth-section h2 span { font-size: 16px; }
    .growth-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 20px; }
    
    /* Loading / Error */
    .loading { text-align: center; padding: 60px; color: #666; font-size: 14px; }
    .error { background: #2a1a1a; border: 1px solid #f87171; border-radius: 8px; padding: 16px; color: #f87171; margin-bottom: 20px; display: none; }
    
    /* Section title */
    .section-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #2a2d3a; display: flex; align-items: center; gap: 8px; }
    
    @media (max-width: 768px) {
      .tabs { flex-wrap: wrap; }
      .tab { flex: 1; min-width: 80px; text-align: center; padding: 8px 12px; font-size: 13px; }
      .charts-grid, .growth-grid { grid-template-columns: 1fr; }
      .cards { grid-template-columns: repeat(2, 1fr); }
      .header { padding: 12px 16px; }
      .container { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌱 GrowFood Analytics</h1>
    <span class="updated-time" id="updated"></span>
  </div>
  
  <div class="container">
    <div id="error-box" class="error"></div>
    <div id="loading" class="loading">Загрузка данных...</div>
    
    <div id="content" style="display:none">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="day">📅 День</button>
        <button class="tab" data-tab="week">📊 Неделя</button>
        <button class="tab" data-tab="month">📆 Месяц</button>
      </div>
      
      <div class="period-info" id="period-info"></div>
      
      <!-- Summary Cards -->
      <div class="cards" id="cards"></div>
      
      <!-- Main Charts -->
      <div class="section-title">📈 Динамика</div>
      <div class="charts-grid" id="main-charts"></div>
      
      <!-- Growth Charts -->
      <div class="growth-section">
        <h2>📐 Прирост / Снижение</h2>
        <div class="growth-grid" id="growth-charts"></div>
      </div>
    </div>
  </div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzPr2F50egG1jeynWjNsFPIl_8H7Fdtle1o7qIJMYv0mmaMmwvJAhDaBYSvH_nN7WvN/exec';

const MONTH_NAMES = {
  '❄️ январь 2026': 'Январь', '❄️ февраль 2026': 'Февраль', '🌿 март 2026': 'Март',
  '🌱 Текущий месяц': 'Апрель', '🌿 май 2026': 'Май', '☀️ июнь 2026': 'Июнь',
  '☀️ июль 2026': 'Июль', '☀️ август 2026': 'Август', '🍂 сентябрь 2026': 'Сентябрь',
  '🍂 октябрь 2026': 'Октябрь', '🍂 ноябрь 2026': 'Ноябрь', '❄️ декабрь 2026': 'Декабрь'
};

let rawData = [];
let currentTab = 'day';
let charts = [];

// Month mapping to ensure correct order
const MONTH_ORDER = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

async function load() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    rawData = json.data || [];
    document.getElementById('updated').textContent = 'Обновлено: ' + new Date(json.updated).toLocaleString('ru-RU');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    initTabs();
    renderAll();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    const err = document.getElementById('error-box');
    err.style.display = 'block';
    err.textContent = 'Ошибка загрузки: ' + e.message;
  }
}

function initTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      destroyCharts();
      renderAll();
    });
  });
}

function destroyCharts() {
  charts.forEach(c => c.destroy());
  charts = [];
}

function getEntries(metric) {
  return rawData.filter(r => r.metric === metric);
}

function getMonthKey(rawMonth) {
  return MONTH_NAMES[rawMonth] || rawMonth;
}

function getMonthData(monthRaw) {
  const result = [];
  const entries = getEntries('ГФ/Приём').filter(e => e.month === monthRaw);
  if (entries.length) {
    entries[0].values.forEach((v, i) => {
      if (typeof v === 'number' && v > 0) result.push({ day: i + 1, value: v });
    });
  }
  return result;
}

// Get all months in order
function getAllMonths() {
  const months = [];
  rawData.forEach(r => {
    const m = getMonthKey(r.month);
    if (m && !months.includes(m)) months.push(m);
  });
  return months;
}

// Sum array
function sum(arr) { return arr.reduce((a,b) => a + b, 0); }

// Format number
function fmt(v) {
  if (v === null || v === undefined) return '—';
  return Number(v).toLocaleString('ru-RU', { maximumFractionDigits: 0 });
}

// Calculate % change
function pctChange(current, previous) {
  if (!previous || previous === 0) return null;
  return ((current - previous) / previous * 100);
}

// Aggregate daily data into weeks (Mon-Sun)
function aggregateWeeks(dailyData) {
  const weeks = [];
  for (let i = 0; i < dailyData.length; i += 7) {
    const weekData = dailyData.slice(i, i + 7);
    weeks.push({ label: 'Нед. ' + Math.ceil((i + 1) / 7), total: sum(weekData), days: weekData });
  }
  return weeks;
}

// ============ RENDER ============

function renderAll() {
  renderPeriodInfo();
  renderCards();
  renderMainCharts();
  renderGrowthCharts();
}

function renderPeriodInfo() {
  const months = getAllMonths();
  let text = '';
  if (currentTab === 'day') {
    const currentMonth = months[months.length - 1] || 'Текущий';
    text = `📅 День: ${currentMonth} 2026 — дневные данные`;
  } else if (currentTab === 'week') {
    text = `📊 Неделя: Последние 12 недель — недельная агрегация`;
  } else {
    text = `📆 Месяц: ${months.length} месяцев (весь год) — помесячная агрегация`;
  }
  document.getElementById('period-info').textContent = text;
}

function renderCards() {
  const container = document.getElementById('cards');
  const months = getAllMonths();
  
  // Calculate aggregates based on current tab
  let gfPriom = 0, retail = 0, laas = 0, perf = 0, hours = 0;
  let prevGf = 0, prevRetail = 0;
  
  if (currentTab === 'day') {
    // Current month daily
    const lastMonthRaw = rawData.find(r => r.metric === 'ГФ/Приём');
    if (lastMonthRaw) {
      const vals = lastMonthRaw.values.filter(v => typeof v === 'number' && v > 0);
      gfPriom = vals.length ? vals[vals.length - 1] : 0;
    }
    const retailEntry = rawData.find(r => r.metric === 'Ритейл');
    if (retailEntry) {
      const vals = retailEntry.values.filter(v => typeof v === 'number' && v > 0);
      retail = vals.length ? vals[vals.length - 1] : 0;
    }
    const laasEntry = rawData.find(r => r.metric === 'LAAS');
    if (laasEntry) {
      const vals = laasEntry.values.filter(v => typeof v === 'number' && v > 0);
      laas = vals.length ? vals[vals.length - 1] : 0;
    }
  } else if (currentTab === 'week') {
    // Last 12 weeks totals
    const last12 = months.slice(-12);
    gfPriom = calcMetricTotal('ГФ/Приём', last12);
    retail = calcMetricTotal('Ритейл', last12);
    laas = calcMetricTotal('LAAS', last12);
    const prev12 = months.slice(-24, -12);
    prevGf = calcMetricTotal('ГФ/Приём', prev12);
    prevRetail = calcMetricTotal('Ритейл', prev12);
  } else {
    // Full year monthly
    gfPriom = calcMetricTotal('ГФ/Приём', months);
    retail = calcMetricTotal('Ритейл', months);
    laas = calcMetricTotal('LAAS', months);
    const prevYear = getPreviousPeriodMonths(months);
    prevGf = calcMetricTotal('ГФ/Приём', prevYear);
    prevRetail = calcMetricTotal('Ритейл', prevYear);
  }
  
  // Get latest values for other metrics
  const hoursEntry = rawData.find(r => r.metric === 'Человеко-часы');
  if (hoursEntry) {
    const vals = hoursEntry.values.filter(v => typeof v === 'number' && v > 0);
    hours = vals.length ? vals[vals.length - 1] : 0;
  }
  
  const perfEntry = rawData.find(r => r.metric === 'Приведённая производительность');
  if (perfEntry) {
    const vals = perfEntry.values.filter(v => typeof v === 'number' && v > 0);
    perf = vals.length ? sum(vals) : 0;
  }
  
  const cards = [
    { label: 'ГФ/Приём', value: fmt(gfPriom), delta: pctChange(gfPriom, prevGf) },
    { label: 'Ритейл', value: fmt(retail), delta: pctChange(retail, prevRetail) },
    { label: 'LAAS', value: fmt(laas), delta: null },
    { label: 'Производительность', value: fmt(perf), delta: null },
    { label: 'Человеко-часы', value: fmt(hours), delta: null },
    { label: 'Доля кастома', value: calcShare(), delta: null, highlight: true }
  ];
  
  container.innerHTML = cards.map(c => {
    const deltaHtml = c.delta !== null ? 
      `<div class="delta ${c.delta >= 0 ? 'up' : 'down'}">${c.delta >= 0 ? '↑' : '↓'} ${Math.abs(c.delta).toFixed(1)}%</div>` : '';
    const hl = c.highlight ? ' highlight' : '';
    return `<div class="card${hl}"><div class="label">${c.label}</div><div class="value">${c.value}</div>${deltaHtml}</div>`;
  }).join('');
}

function calcMetricTotal(metric, months) {
  let total = 0;
  getEntries(metric).forEach(entry => {
    const m = getMonthKey(entry.month);
    if (months.includes(m)) {
      total += sum(entry.values.filter(v => typeof v === 'number' && v > 0));
    }
  });
  return total;
}

function calcShare() {
  const gf = latestRawValue('ГФ/Приём');
  const retail = latestRawValue('Ритейл');
  if (!gf) return '—';
  return ((retail / gf) * 100).toFixed(1) + '%';
}

function latestRawValue(metric) {
  const entries = getEntries(metric);
  if (!entries.length) return 0;
  const vals = entries[entries.length - 1].values.filter(v => typeof v === 'number' && v > 0);
  return vals.length ? vals[vals.length - 1] : 0;
}

function getPreviousPeriodMonths(months) {
  // Map to previous period months (e.g. ['Январь','Февраль'] -> ['Декабрь','Ноябрь'] of prev year)
  return months.map((m, i) => {
    const idx = MONTH_ORDER.indexOf(m);
    return MONTH_ORDER[(idx + 6) % 12]; // rough previous half-year
  });
}

// ============ MAIN CHARTS ============

function renderMainCharts() {
  const container = document.getElementById('main-charts');
  container.innerHTML = '';
  
  const chartConfigs = getChartConfig();
  
  chartConfigs.forEach((cfg, idx) => {
    const box = document.createElement('div');
    box.className = 'chart-box';
    box.innerHTML = `<h3>${cfg.title}</h3><canvas id="main-chart-${idx}"></canvas>`;
    container.appendChild(box);
    
    const ctx = document.getElementById('main-chart-' + idx).getContext('2d');
    const chart = new Chart(ctx, {
      type: cfg.type,
      data: { labels: cfg.labels, datasets: cfg.datasets },
      options: getChartOptions(cfg.type)
    });
    charts.push(chart);
  });
}

function getChartConfig() {
  const months = getAllMonths();
  
  if (currentTab === 'day') {
    // Daily view - current month only
    return getDayChartConfig(months[months.length - 1] || 'Январь');
  } else if (currentTab === 'week') {
    // Weekly view - last 12 weeks
    return getWeekChartConfig(months.slice(-12));
  } else {
    // Monthly view - all months
    return getMonthChartConfig(months);
  }
}

function getDayChartConfig(currentMonthRaw) {
  const entries = getEntries('ГФ/Приём').filter(e => {
    const m = getMonthKey(e.month);
    return m === currentMonthRaw;
  });
  
  let days = [];
  if (entries.length) {
    days = entries[0].values.map((_, i) => i + 1);
  }
  
  return [
    {
      title: `ГФ/Приём — ${currentMonthRaw}`,
      type: 'bar',
      labels: days.map(d => d + ' ' + currentMonthRaw.slice(0,3)),
      datasets: [
        {
          label: 'ГФ/Приём',
          data: entries.length ? entries[0].values.map(v => typeof v === 'number' && v > 0 ? v : 0) : [],
          backgroundColor: '#6366f1'
        }
      ]
    }
  ];
}

function getWeekChartConfig(recentMonths) {
  // Aggregate by weeks across recent months
  const weeks = [];
  const weekData = { 'ГФ/Приём': [], 'Ритейл': [], 'LAAS': [] };
  
  recentMonths.forEach(month => {
    getEntries('ГФ/Приём').filter(e => getMonthKey(e.month) === month).forEach(e => {
      const vals = e.values.filter(v => typeof v === 'number' && v > 0);
      // Aggregate into weeks
      for (let i = 0; i < vals.length; i += 7) {
        const weekIdx = weeks.length;
        const weekVals = vals.slice(i, i + 7);
        if (!weekData['ГФ/Приём'][weekIdx]) {
          weeks.push('Нед. ' + (weekIdx + 1));
          weekData['ГФ/Приём'][weekIdx] = 0;
          weekData['Ритейл'][weekIdx] = 0;
          weekData['LAAS'][weekIdx] = 0;
        }
        weekData['ГФ/Приём'][weekIdx] += sum(weekVals);
      }
    });
    
    getEntries('Ритейл').filter(e => getMonthKey(e.month) === month).forEach(e => {
      const vals = e.values.filter(v => typeof v === 'number' && v > 0);
      for (let i = 0; i < vals.length; i += 7) {
        const weekIdx = weeks.length > 0 ? Math.floor(i / 7) : 0;
        if (weekData['Ритейл'][weekIdx] !== undefined) {
          weekData['Ритейл'][weekIdx] += sum(vals.slice(i, i + 7));
        }
      }
    });
  });
  
  const last12Labels = weeks.slice(-12);
  
  return [
    {
      title: 'ГФ/Приём по неделям (последние 12 недель)',
      type: 'bar',
      labels: last12Labels,
      datasets: [{
        label: 'ГФ/Приём',
        data: weekData['ГФ/Приём'].slice(-12),
        backgroundColor: '#6366f1'
      }]
    },
    {
      title: 'Ритейл по неделям',
      type: 'bar',
      labels: last12Labels,
      datasets: [{
        label: 'Ритейл',
        data: weekData['Ритейл'].slice(-12),
        backgroundColor: '#22d3ee'
      }]
    },
    {
      title: 'LAAS по неделям',
      type: 'bar',
      labels: last12Labels,
      datasets: [{
        label: 'LAAS',
        data: weekData['LAAS'].slice(-12),
        backgroundColor: '#f59e0b'
      }]
    },
    {
      title: 'Производительность (линия)',
      type: 'line',
      labels: last12Labels,
      datasets: [{
        label: 'Прив. производительность',
        data: weekData['ГФ/Приём'].slice(-12).map(v => Math.round(v / 40)),
        borderColor: '#4ade80',
        backgroundColor: '#4ade8033',
        fill: true,
        tension: 0.3
      }]
    }
  ];
}

function getMonthChartConfig(months) {
  return [
    {
      title: 'ГФ/Приём vs План (месяцы)',
      type: 'bar',
      labels: months,
      datasets: [
        { label: 'ГФ/Приём', data: months.map(m => calcMonthTotal('ГФ/Приём', m)), backgroundColor: '#6366f1' },
        { label: 'План', data: months.map(m => calcMonthTotal('План - ГФ/Приём', m)), backgroundColor: '#3a3d5a' }
      ]
    },
    {
      title: 'Ритейл vs План (месяцы)',
      type: 'bar',
      labels: months,
      datasets: [
        { label: 'Ритейл', data: months.map(m => calcMonthTotal('Ритейл', m)), backgroundColor: '#22d3ee' },
        { label: 'План', data: months.map(m => calcMonthTotal('План - Ритейл', m)), backgroundColor: '#3a3d5a' }
      ]
    },
    {
      title: 'LAAS vs План (месяцы)',
      type: 'bar',
      labels: months,
      datasets: [
        { label: 'LAAS', data: months.map(m => calcMonthTotal('LAAS', m)), backgroundColor: '#f59e0b' },
        { label: 'План', data: months.map(m => calcMonthTotal('План - LAAS', m)), backgroundColor: '#3a3d5a' }
      ]
    },
    {
      title: 'Приведённая производительность (тренд)',
      type: 'line',
      labels: months,
      datasets: [{
        label: 'Прив. производительность',
        data: months.map(m => calcMonthTotal('Приведённая производительность', m)),
        borderColor: '#4ade80',
        backgroundColor: '#4ade8033',
        fill: true,
        tension: 0.3
      }]
    }
  ];
}

function calcMonthTotal(metric, monthName) {
  let total = 0;
  getEntries(metric).forEach(entry => {
    if (getMonthKey(entry.month) === monthName) {
      total += sum(entry.values.filter(v => typeof v === 'number' && v > 0));
    }
  });
  return total;
}

function getChartOptions(type) {
  const base = {
    responsive: true,
    plugins: {
      legend: { labels: { color: '#888', font: { size: 11 } } },
      tooltip: {
        callbacks: {
          label: ctx => ctx.dataset.label + ': ' + (typeof ctx.raw === 'number' ? ctx.raw.toLocaleString('ru-RU', { maximumFractionDigits: 0 }) : ctx.raw)
        }
      }
    },
    scales: {
      x: { ticks: { color: '#666', font: { size: 10 } }, grid: { color: '#1e2030' } },
      y: { ticks: { color: '#666', font: { size: 10 } }, grid: { color: '#1e2030' } }
    }
  };
  return base;
}

// ============ GROWTH CHARTS ============

function renderGrowthCharts() {
  const container = document.getElementById('growth-charts');
  container.innerHTML = '';
  
  const months = getAllMonths();
  
  // Calculate month-over-month change
  const momData = calcMoMChange(months);
  
  // Calculate week-over-week change (for last 8 weeks)
  const wowData = calcWoWChange();
  
  // Create growth chart configs
  const configs = [
    {
      title: '📊 Месяц к месяцу (% изменения)',
      labels: momData.labels,
      datasets: [{
        label: 'ГФ/Приём %',
        data: momData.gfPriom,
        borderColor: '#6366f1',
        backgroundColor: '#6366f133',
        fill: true,
        tension: 0.3
      }, {
        label: 'Ритейл %',
        data: momData.retail,
        borderColor: '#22d3ee',
        backgroundColor: '#22d3ee33',
        fill: true,
        tension: 0.3
      }]
    },
    {
      title: '📐 Неделя к неделе (% изменения)',
      labels: wowData.labels,
      datasets: [{
        label: 'ГФ/Приём %',
        data: wowData.gf,
        borderColor: '#4ade80',
        backgroundColor: '#4ade8033',
        fill: true,
        tension: 0.3
      }]
    }
  ];
  
  configs.forEach((cfg, idx) => {
    const box = document.createElement('div');
    box.className = 'chart-box';
    box.innerHTML = `<h3>${cfg.title}</h3><canvas id="growth-chart-${idx}"></canvas>`;
    container.appendChild(box);
    
    const ctx = document.getElementById('growth-chart-' + idx).getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: { labels: cfg.labels, datasets: cfg.datasets },
      options: {
        ...getChartOptions('line'),
        plugins: {
          ...getChartOptions('line').plugins,
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.dataset.label}: ${ctx.raw !== null ? ctx.raw.toFixed(1) + '%' : '—'}`
            }
          }
        }
      },
      scales: {
        ...getChartOptions('line').scales,
        y: {
          ...getChartOptions('line').scales.y,
          ticks: {
            ...getChartOptions('line').scales.y.ticks,
            callback: v => v + '%'
          }
        }
      }
    });
    charts.push(chart);
  });
}

function calcMoMChange(months) {
  const labels = [];
  const gfValues = [];
  const retailValues = [];
  
  for (let i = 1; i < months.length; i++) {
    const curr = months[i];
    const prev = months[i - 1];
    
    labels.push(curr);
    
    const currGf = calcMonthTotal('ГФ/Приём', curr);
    const prevGf = calcMonthTotal('ГФ/Приём', prev);
    gfValues.push(pctChange(currGf, prevGf));
    
    const currRetail = calcMonthTotal('Ритейл', curr);
    const prevRetail = calcMonthTotal('Ритейл', prev);
    retailValues.push(pctChange(currRetail, prevRetail));
  }
  
  return { labels, gfPriom: gfValues, retail: retailValues };
}

function calcWoWChange() {
  const labels = [];
  const gfValues = [];
  
  // Aggregate by weeks
  const allMonths = getAllMonths().slice(-6); // last 6 months for week calc
  let weeklyGf = [];
  
  allMonths.forEach(month => {
    getEntries('ГФ/Приём').filter(e => getMonthKey(e.month) === month).forEach(e => {
      const vals = e.values.filter(v => typeof v === 'number' && v > 0);
      for (let i = 0; i < vals.length; i += 7) {
        const weekIdx = weeklyGf.length;
        if (weeklyGf[weekIdx] === undefined) weeklyGf[weekIdx] = 0;
        weeklyGf[weekIdx] += sum(vals.slice(i, i + 7));
      }
    });
  });
  
  // Calculate WoW changes
  const lastWeeks = weeklyGf.slice(-12);
  for (let i = 1; i < lastWeeks.length; i++) {
    labels.push('Нед. ' + (i + 1));
    gfValues.push(pctChange(lastWeeks[i], lastWeeks[i - 1]));
  }
  
  return { labels, gf: gfValues };
}
